<svg width="100%" viewBox="0 0 680 620" xmlns="http://www.w3.org/2000/svg" style="font-family: Arial, sans-serif; background: white;">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Input box -->
  <rect x="220" y="20" width="240" height="44" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
  <text x="340" y="46" text-anchor="middle" font-size="14" font-weight="500" fill="#2C2C2A">Packet A / Packet B</text>

  <!-- Arrow -->
  <line x1="340" y1="64" x2="340" y2="92" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Agent 1: Triage -->
  <rect x="180" y="94" width="320" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="340" y="118" text-anchor="middle" font-size="14" font-weight="500" fill="#3C3489">1. Triage agent</text>
  <text x="340" y="138" text-anchor="middle" font-size="12" fill="#534AB7">Severity score, risks, hold-comment, deadlines</text>

  <line x1="340" y1="150" x2="340" y2="178" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Agent 2: Router -->
  <rect x="180" y="180" width="320" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="340" y="204" text-anchor="middle" font-size="14" font-weight="500" fill="#085041">2. Router agent</text>
  <text x="340" y="224" text-anchor="middle" font-size="12" fill="#0F6E56">Stakeholder queue, approvals, sequencing</text>

  <line x1="340" y1="236" x2="340" y2="264" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Agent 3: Drafting -->
  <rect x="180" y="266" width="320" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="340" y="290" text-anchor="middle" font-size="14" font-weight="500" fill="#0C447C">3. Drafting agent</text>
  <text x="340" y="310" text-anchor="middle" font-size="12" fill="#185FA5">Sponsor line, reporter reply, manager brief</text>

  <line x1="340" y1="322" x2="340" y2="350" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Agent 4: Reviewer -->
  <rect x="180" y="352" width="320" height="56" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="340" y="376" text-anchor="middle" font-size="14" font-weight="500" fill="#633806">4. Reviewer agent</text>
  <text x="340" y="396" text-anchor="middle" font-size="12" fill="#854F0B">Flags issues, revises drafts, approves finals</text>

  <!-- Phase A bracket -->
  <rect x="30" y="94" width="100" height="314" rx="6" fill="none" stroke="#ccc" stroke-width="0.5" stroke-dasharray="4 3"/>
  <text x="80" y="252" text-anchor="middle" font-size="12" fill="#888" transform="rotate(-90,80,252)">Phase A</text>

  <line x1="340" y1="408" x2="340" y2="436" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Human review -->
  <rect x="180" y="438" width="320" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text x="340" y="462" text-anchor="middle" font-size="14" font-weight="500" fill="#712B13">Human review</text>
  <text x="340" y="482" text-anchor="middle" font-size="12" fill="#993C1D">Operator listens to voicemails, provides transcripts</text>

  <line x1="340" y1="494" x2="340" y2="522" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Agent 5: Escalation -->
  <rect x="180" y="524" width="320" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="340" y="548" text-anchor="middle" font-size="14" font-weight="500" fill="#3C3489">5. Escalation agent</text>
  <text x="340" y="568" text-anchor="middle" font-size="12" fill="#534AB7">Diffs Phase B vs A, updates plan</text>

  <!-- Phase B bracket -->
  <rect x="550" y="438" width="100" height="142" rx="6" fill="none" stroke="#ccc" stroke-width="0.5" stroke-dasharray="4 3"/>
  <text x="600" y="510" text-anchor="middle" font-size="12" fill="#888" transform="rotate(-90,600,510)">Phase B</text>

  <line x1="340" y1="580" x2="340" y2="598" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="340" y="614" text-anchor="middle" font-size="12" fill="#888">output/submission.md</text>
</svg>
